<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Syllabus</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* critical fixes */
html,body{
  height:auto;
  overflow-x:hidden;
  margin:0;
}

#syllabus-root{
  width:100%;
  max-width:1100px;
  margin:auto;
  padding:20px;
  display:block;
}

/* Sticky CTA buttons */
#sticky-cta-buttons {
  position: sticky;
  bottom: 0;
  display: flex;
  justify-content: center;
  gap: 10px;
  background: #fff;
  padding: 12px 20px;
  border-top: 1px solid #ddd;
  z-index: 1000;
}

#sticky-cta-buttons a {
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 5px;
  font-weight: bold;
  color: #fff;
}

#sticky-cta-buttons .btn-primary { background:#1e3a8a; }
#sticky-cta-buttons .btn-secondary { background:#22c55e; }

</style>

</head>

<body>

<!-- BRAND HEADER -->
<header class="brand-bar">
   <div class="brand-logo">SarkariNokriEngine</div>
   <nav class="brand-links">
      <a href="/">Home</a>
      <a href="/railways/">Railway</a>
      <a href="/ssc/">SSC</a>
      <a href="/bank/">Bank</a>
   </nav>
</header>

<!-- POPUP -->
<div id="popup-ad-container"></div>

<!-- MAIN -->
<main id="syllabus-root">
<div class="loader-box">
Initializing Syllabus Engine...
</div>
</main>

<!-- FOOTER -->
<footer class="site-footer">

<div class="footer-grid">
  <!-- Footer will be dynamically injected -->
</div>

<div class="footer-bottom">
© 2026 SarkariNokriEngine • All Rights Reserved
</div>

</footer>

<!-- STICKY FOOTER AD -->
<div id="sticky-footer-ad"></div>

<script src="js/main.js"></script>
<script>
document.addEventListener("DOMContentLoaded",function(){

SyllabusEngine.init({
  masterId:"ssc-cgl"
});

});
</script>

</body>
</html>
